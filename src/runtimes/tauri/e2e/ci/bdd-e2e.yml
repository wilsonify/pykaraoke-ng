# BDD End-to-End Test CI Configuration Snippet
#
# Add this job to .github/workflows/ci-cd.yml after the build stage
# to run BDD acceptance tests against the built Tauri application.
#
# Prerequisites:
#   - Node.js 20+ (set up in earlier jobs)
#   - Chrome/Chromium for headless browser automation
#   - The application under test running (via docker-compose or Tauri dev server)
#
# Usage:
#   Copy the job definition below into your CI workflow file.

name: BDD E2E Tests

# This is a reusable snippet — integrate into the main ci-cd.yml pipeline.

jobs:
  bdd-e2e-tests:
    name: BDD E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    permissions:
      contents: read

    services:
      # Selenium standalone Chrome for headless browser automation
      selenium:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444
        options: --shm-size=2g

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/runtimes/tauri/e2e/package-lock.json

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev,test]"

      # Start the application under test in the background
      - name: Start application services
        run: |
          docker compose -f deploy/docker/docker-compose.yml \
            --profile e2e up -d --wait
        env:
          SONGS_DIR: ./songs

      # Wait for backend health check
      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Install BDD test dependencies
        working-directory: src/runtimes/tauri/e2e
        run: npm ci

      - name: Run BDD E2E tests (fail-fast)
        working-directory: src/runtimes/tauri/e2e
        run: npm run test:e2e:ci
        env:
          E2E_APP_URL: http://localhost:3000
          SELENIUM_URL: http://localhost:4444/wd/hub

      - name: Upload BDD test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-e2e-reports
          path: |
            src/runtimes/tauri/e2e/reports/
          retention-days: 7

      - name: Stop application services
        if: always()
        run: |
          docker compose -f deploy/docker/docker-compose.yml \
            --profile e2e down
