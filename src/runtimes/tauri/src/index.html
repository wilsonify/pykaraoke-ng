<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyKaraoke NG</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Compact Header -->
        <header class="app-header">
            <span class="app-title">🎤 PyKaraoke NG</span>
            <button id="settings-btn" class="btn btn-icon" title="Settings">⚙️</button>
        </header>

        <!-- Vertical Flow: single column, top to bottom -->
        <div class="main-container">

            <!-- Search (always visible, pinned top) -->
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search songs… (Esc to clear)">
                    <button id="search-btn" class="btn btn-primary">Go</button>
                </div>
                <details class="search-filters" open>
                    <summary>Library</summary>
                    <div class="folder-input-row">
                        <input type="text" id="folder-input" placeholder="/path/to/songs" value="/app/songs">
                        <button id="add-folder-btn" class="btn btn-primary btn-sm">Add</button>
                    </div>
                    <div class="library-controls">
                        <button id="scan-library-btn" class="btn btn-secondary btn-sm">Scan Library</button>
                    </div>
                </details>
            </div>

            <!-- Search Results (scrollable) -->
            <div class="search-results">
                <div class="section-label">Results</div>
                <div id="results-list" class="song-list">
                    <div class="no-results">Search for songs to see results</div>
                </div>
            </div>

            <!-- Now Playing (compact) -->
            <div class="player-section">
                <div class="section-label">Now Playing</div>
                <div class="now-playing-info">
                    <div id="current-song-title" class="song-title">No song loaded</div>
                    <div id="current-song-artist" class="song-artist"></div>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                    <div class="time-display">
                        <span id="time-current">0:00</span>
                        <span id="time-total">0:00</span>
                    </div>
                </div>
                <div class="player-controls">
                    <button id="prev-btn" class="btn-control" title="Previous">⏮</button>
                    <button id="play-btn" class="btn-control btn-play" title="Play">▶️</button>
                    <button id="pause-btn" class="btn-control" style="display:none;" title="Pause">⏸</button>
                    <button id="stop-btn" class="btn-control" title="Stop">⏹</button>
                    <button id="next-btn" class="btn-control" title="Next">⏭</button>
                </div>
                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" id="volume-slider" min="0" max="100" value="75">
                    <span id="volume-value">75%</span>
                </div>
            </div>

            <!-- Queue (scrollable) -->
            <div class="playlist-section">
                <div class="section-header">
                    <span class="section-label">Queue</span>
                    <button id="clear-playlist-btn" class="btn btn-secondary btn-sm">Clear</button>
                </div>
                <div id="playlist" class="song-list">
                    <div class="no-results">Playlist is empty</div>
                </div>
            </div>

        </div>

        <!-- Status Bar -->
        <footer class="status-bar">
            <div id="status-message">Ready</div>
            <div id="backend-status">Backend: Not Connected</div>
        </footer>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ Settings</h2>
                <button id="settings-close-btn" class="btn btn-secondary">✕</button>
            </div>
            <div class="modal-body">
                <div class="setting-row">
                    <label for="setting-fullscreen">Fullscreen playback</label>
                    <input type="checkbox" id="setting-fullscreen">
                </div>
                <div class="setting-row">
                    <label for="setting-zoom">CDG zoom mode</label>
                    <select id="setting-zoom" class="setting-select">
                        <option value="soft">Soft</option>
                        <option value="hard">Hard</option>
                        <option value="none">None</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button id="settings-cancel-btn" class="btn btn-secondary">Cancel</button>
                <button id="settings-save-btn" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
