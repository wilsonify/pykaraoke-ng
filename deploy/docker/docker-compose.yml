# PyKaraoke-NG Docker Compose Configuration
# 
# Usage:
#   docker compose up                       # Start backend API + browser debug UI
#   docker compose up -d                    # Start in background
#   Open http://localhost:3000              # Debug UI in your browser
#   docker compose --profile tauri-dev up   # Tauri development mode
#   docker compose --profile test up        # Run tests
#   docker compose down                     # Stop and remove
#
# Profiles:
#   docker compose --profile dev up         # Python development mode
#   docker compose --profile tauri-dev up   # Tauri frontend development
#   docker compose --profile tauri-build up # Build Tauri binaries
#   docker compose --profile test up        # Run tests
#   docker compose --profile e2e up --abort-on-container-exit test-e2e  # Selenium E2E tests
#   docker compose --profile e2e-bdd up --abort-on-container-exit test-e2e-bdd  # BDD E2E tests

name: pykaraoke-ng

services:
  # ==========================================================================
  # Browser Debug UI (nginx serving frontend with HTTP bridge)
  # ==========================================================================
  ui:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: ui
    image: pykaraoke-ng:ui
    container_name: pykaraoke-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount frontend source for live editing during debug
      - ../../src/runtimes/tauri/src:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pykaraoke-net

  # ==========================================================================
  # Python Backend API Service (for Tauri)
  # ==========================================================================
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: backend
    image: pykaraoke-ng:backend
    container_name: pykaraoke-backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYKARAOKE_API_HOST=0.0.0.0
      - PYKARAOKE_API_PORT=8080
      - SDL_AUDIODRIVER=dummy
      - SDL_VIDEODRIVER=dummy
    volumes:
      # Mount songs directory (customize path as needed)
      - ${SONGS_DIR:-../../songs}:/app/songs:ro
      # Mount test fixture songs so the library scanner can find them
      - ../../tests/fixtures:/app/fixtures:ro
    ports:
      - "8080:8080"
    networks:
      - pykaraoke-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ==========================================================================
  # Tauri Desktop App (Runtime with GUI)
  # ==========================================================================
  tauri-app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: tauri-runtime
    image: pykaraoke-ng:tauri
    container_name: pykaraoke-tauri-app
    profiles:
      - tauri
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-}
      - XDG_RUNTIME_DIR=/run/user/1000
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - PYKARAOKE_BACKEND_URL=http://backend:8080
    volumes:
      # Mount songs directory
      - ${SONGS_DIR:-../../songs}:/app/songs:ro
      # X11 socket for GUI (Linux)
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      # Wayland socket (if using Wayland)
      - ${XDG_RUNTIME_DIR:-/run/user/1000}:/run/user/1000:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pykaraoke-net
    # For GUI access: xhost +local:docker

  # ==========================================================================
  # Tauri Development Service
  # ==========================================================================
  tauri-dev:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: tauri-dev
    image: pykaraoke-ng:tauri-dev
    container_name: pykaraoke-tauri-dev
    profiles:
      - tauri-dev
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-}
      - XDG_RUNTIME_DIR=/run/user/1000
      - PYKARAOKE_BACKEND_URL=http://backend:8080
      - CARGO_HOME=/app/.cargo
      - RUSTUP_HOME=/app/.rustup
    volumes:
      # Mount Tauri source for live development
      - ../../src/runtimes/tauri:/app/tauri:cached
      # Mount Python backend source
      - ../../src/pykaraoke:/app/src/pykaraoke:cached
      # Cargo cache for faster builds
      - cargo-cache:/app/.cargo
      - rustup-cache:/app/.rustup
      # X11 socket for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    working_dir: /app/tauri
    command: ["cargo", "tauri", "dev"]
    depends_on:
      backend:
        condition: service_healthy
    stdin_open: true
    tty: true
    networks:
      - pykaraoke-net

  # ==========================================================================
  # Tauri Build Service (produces binaries)
  # ==========================================================================
  tauri-build:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: tauri-dev
    image: pykaraoke-ng:tauri-dev
    container_name: pykaraoke-tauri-build
    profiles:
      - tauri-build
    environment:
      - CARGO_HOME=/app/.cargo
      - RUSTUP_HOME=/app/.rustup
    volumes:
      # Mount Tauri source
      - ../../src/runtimes/tauri:/app/tauri:cached
      # Cargo cache for faster builds
      - cargo-cache:/app/.cargo
      - rustup-cache:/app/.rustup
      # Output directory for built binaries
      - ../../dist:/app/dist
    working_dir: /app/tauri
    command: ["cargo", "tauri", "build"]
    networks:
      - pykaraoke-net

  # ==========================================================================
  # Python Development Service
  # ==========================================================================
  dev:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: development
    image: pykaraoke-ng:dev
    container_name: pykaraoke-dev
    profiles:
      - dev
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Mount source for live reload
      - ../..:/app:cached
      # Anonymous volume for venv to avoid overwriting
      - /app/.venv
    working_dir: /app
    command: ["bash"]
    stdin_open: true
    tty: true
    networks:
      - pykaraoke-net

  # ==========================================================================
  # Test Runner Service (Unit Tests Only)
  # ==========================================================================
  test:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: test
    image: pykaraoke-ng:test
    container_name: pykaraoke-test
    profiles:
      - test
    environment:
      - PYTHONUNBUFFERED=1
      - PYTEST_ADDOPTS=--color=yes
    volumes:
      # Mount source for testing current code
      - ../../tests:/app/tests:ro
      - ../../pyproject.toml:/app/pyproject.toml:ro
      - ../../src:/app/src:ro
      # Mount for coverage output
      - ../../htmlcov:/app/htmlcov
    command: ["pytest", "tests/", "-v", "--tb=short", "-m", "not integration"]
    networks:
      - pykaraoke-net

  # ==========================================================================
  # Test with Coverage
  # ==========================================================================
  test-coverage:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: test
    image: pykaraoke-ng:test
    container_name: pykaraoke-test-coverage
    profiles:
      - test
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../../tests:/app/tests:ro
      - ../../pyproject.toml:/app/pyproject.toml:ro
      - ../../src:/app/src:ro
      - ../../htmlcov:/app/htmlcov
    command: >
      pytest tests/ -v
      --cov=/app
      --cov-report=term-missing
      --cov-report=html:/app/htmlcov
      -m not integration
    networks:
      - pykaraoke-net

  # ==========================================================================
  # Integration Test Backend Server
  # ==========================================================================
  backend-test:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: backend
    image: pykaraoke-ng:backend
    container_name: pykaraoke-backend-test
    profiles:
      - integration
    environment:
      - PYTHONUNBUFFERED=1
      - PYKARAOKE_API_HOST=0.0.0.0
      - PYKARAOKE_API_PORT=8080
    volumes:
      # Mount source for latest code
      - ../../src/pykaraoke:/app/src/pykaraoke:ro
      # Mount test songs if available
      - ../../songs:/app/songs:ro
    ports:
      - "8080"
    networks:
      - pykaraoke-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 2s

  # ==========================================================================
  # Integration Test Runner
  # ==========================================================================
  test-integration:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: test
    image: pykaraoke-ng:test
    container_name: pykaraoke-test-integration
    profiles:
      - integration
    environment:
      - PYTHONUNBUFFERED=1
      - PYTEST_ADDOPTS=--color=yes
      - PYKARAOKE_API_URL=http://backend-test:8080
    volumes:
      # Mount source for testing current code
      - ../../tests:/app/tests:ro
      - ../../src:/app/src:ro
      - ../../pyproject.toml:/app/pyproject.toml:ro
      # Mount for coverage output
      - ../../htmlcov:/app/htmlcov
    command: ["pytest", "tests/", "-v", "--tb=short", "-m", "integration"]
    depends_on:
      backend-test:
        condition: service_healthy
    networks:
      - pykaraoke-net

  # ==========================================================================
  # Full Test Suite (Unit + Integration)
  # ==========================================================================
  test-all:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: test
    image: pykaraoke-ng:test
    container_name: pykaraoke-test-all
    profiles:
      - test
    environment:
      - PYTHONUNBUFFERED=1
      - PYTEST_ADDOPTS=--color=yes
      - PYKARAOKE_API_URL=http://backend-test:8080
    volumes:
      - ../../tests:/app/tests:ro
      - ../../src:/app/src:ro
      - ../../pyproject.toml:/app/pyproject.toml:ro
      - ../../htmlcov:/app/htmlcov
    command: ["pytest", "tests/", "-v", "--tb=short"]
    depends_on:
      backend-test:
        condition: service_healthy
    networks:
      - pykaraoke-net

  # ==========================================================================
  # Full Test Suite with Coverage
  # ==========================================================================
  test-all-coverage:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: test
    image: pykaraoke-ng:test
    container_name: pykaraoke-test-all-coverage
    profiles:
      - test
    environment:
      - PYTHONUNBUFFERED=1
      - PYKARAOKE_API_URL=http://backend-test:8080
    volumes:
      - ../../tests:/app/tests:ro
      - ../../src:/app/src:ro
      - ../../pyproject.toml:/app/pyproject.toml:ro
      - ../../htmlcov:/app/htmlcov
    command: >
      pytest tests/ -v
      --cov=/app
      --cov-report=term-missing
      --cov-report=html:/app/htmlcov
    depends_on:
      backend-test:
        condition: service_healthy
    networks:
      - pykaraoke-net

  # ==========================================================================
  # Linting Service
  # ==========================================================================
  lint:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: development
    image: pykaraoke-ng:dev
    container_name: pykaraoke-lint
    profiles:
      - dev
    volumes:
      - ../..:/app:ro
    command: ["python", "-m", "ruff", "check", "."]
    networks:
      - pykaraoke-net

  # ==========================================================================
  # Selenium (headless Firefox for E2E tests)
  # ==========================================================================
  selenium:
    image: selenium/standalone-firefox:latest
    container_name: pykaraoke-selenium
    profiles:
      - e2e
    shm_size: 2g
    ports:
      - "4444:4444"
      - "7900:7900"
    networks:
      - pykaraoke-net

  # ==========================================================================
  # E2E Test Runner (Selenium against the live UI) — Legacy Python
  # ==========================================================================
  test-e2e:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: test
    image: pykaraoke-ng:test
    container_name: pykaraoke-test-e2e
    profiles:
      - e2e
    environment:
      - PYTHONUNBUFFERED=1
      - PYTEST_ADDOPTS=--color=yes
      - SELENIUM_URL=http://selenium:4444/wd/hub
      - UI_URL=http://ui:3000
    volumes:
      - ../../tests:/app/tests:ro
      - ../../src:/app/src:ro
      - ../../pyproject.toml:/app/pyproject.toml:ro
    command:
      - pytest
      - tests/integration/test_ui_buttons.py
      - -v
      - --tb=short
    depends_on:
      selenium:
        condition: service_started
      ui:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - pykaraoke-net

  # ==========================================================================
  # BDD E2E Test Runner (Cucumber.js + WebdriverIO against the live UI)
  # ==========================================================================
  test-e2e-bdd:
    image: node:20-slim
    container_name: pykaraoke-test-e2e-bdd
    profiles:
      - e2e-bdd
    working_dir: /app/e2e
    environment:
      - E2E_APP_URL=http://ui:3000
      - SELENIUM_URL=http://selenium:4444/wd/hub
    volumes:
      - ../../src/runtimes/tauri/e2e:/app/e2e:ro
      - ../../src/runtimes/tauri/src:/app/src:ro
      - ../../src/runtimes/tauri/src-tauri:/app/src-tauri:ro
    command: ["sh", "-c", "npm ci && npm run test:e2e:ci"]
    depends_on:
      selenium:
        condition: service_started
      ui:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - pykaraoke-net

# ==========================================================================
# Networks
# ==========================================================================
networks:
  pykaraoke-net:
    driver: bridge

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  songs:
    driver: local
  cargo-cache:
    driver: local
  rustup-cache:
    driver: local
