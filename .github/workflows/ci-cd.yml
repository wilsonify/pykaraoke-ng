# Production-grade CI/CD Pipeline for PyKaraoke NG — Rust Native Engine
#
# Job graph (stage order):
#   unit-tests-rust-engine ─┐
#   unit-tests-tauli-shell ─┼─► sonarqube ─► integration-tests ─► build (matrix) ─► e2e-tests (matrix) ─► release
#   unit-tests-frontend ────┘
#
# Pull requests: run full CI, but do NOT trigger the release stage.
# Main branch pushes: run full CI + release stage.
#
# Required secrets:
#   SONAR_TOKEN          – SonarQube/SonarCloud authentication token
#   SONARQUBE_HOST_URL   – SonarQube server URL (e.g. https://sonarcloud.io)
#   TAURI_PRIVATE_KEY    – (optional) Tauri updater signing key
#   TAURI_KEY_PASSWORD   – (optional) Tauri updater key password
name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Cancel redundant runs on the same ref (e.g. rapid-fire pushes).
# Do NOT cancel in-progress runs on main so a release is never interrupted.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 0: Change Detection — determine which jobs are needed.
  # ═══════════════════════════════════════════════════════════════════════════

  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            tauri:
              - 'src/runtimes/tauri/**'
              - '.github/workflows/**'

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1: Unit Tests — Rust engine, Tauri shell, and Frontend.
  # ═══════════════════════════════════════════════════════════════════════════

  unit-tests-rust-engine:
    name: Unit Tests / Rust Engine
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: crates/pykaraoke-engine

      - name: Run Rust engine unit tests
        working-directory: crates/pykaraoke-engine
        run: cargo test

  unit-tests-tauri-shell:
    name: Unit Tests / Tauri Shell
    runs-on: ubuntu-22.04      # Tauri v1 requires webkit2gtk-4.0, only on 22.04
    needs: [changes]
    if: needs.changes.outputs.tauri == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt package archives (Tauri system dependencies)
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-tauri-deps-v1

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libwebkit2gtk-4.0-dev \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: src/runtimes/tauri/src-tauri

      - name: Run Tauri shell unit tests
        working-directory: src/runtimes/tauri/src-tauri
        run: cargo test

  unit-tests-frontend:
    name: Unit Tests / Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run frontend unit tests
        working-directory: src/runtimes/tauri/src
        run: node --test app.test.js index.test.js

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1.5: Spec Kit Validation
  # ═══════════════════════════════════════════════════════════════════════════

  spec-validation:
    name: Spec Kit Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate spec completion
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          chmod +x specs/ci/validate-spec-completion.sh
          BRANCH_NAME="${PR_HEAD_REF:-$(git rev-parse --abbrev-ref HEAD)}"
          SAFE_BRANCH_NAME="$(printf '%s' "$BRANCH_NAME" | tr -cd '[:alnum:]._/-')"
          ./specs/ci/validate-spec-completion.sh "$SAFE_BRANCH_NAME"

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 2: SonarQube — static analysis + quality gate enforcement.
  # ═══════════════════════════════════════════════════════════════════════════

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests-rust-engine, unit-tests-tauri-shell, unit-tests-frontend, spec-validation]
    if: always() && needs.unit-tests-rust-engine.result == 'success' && (needs.unit-tests-tauri-shell.result == 'success' || needs.unit-tests-tauri-shell.result == 'skipped') && needs.unit-tests-frontend.result == 'success' && (needs.spec-validation.result == 'success' || needs.spec-validation.result == 'skipped')
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}

      - name: SonarQube Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 3: Integration Tests
  # ═══════════════════════════════════════════════════════════════════════════

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [sonarqube]
    if: ${{ !cancelled() && needs.sonarqube.result == 'success' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install Chromium for Selenium E2E helper
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q chromium-browser chromium-chromedriver

      - name: Run integration tests
        run: |
          xvfb-run -a cargo test --manifest-path src/runtimes/tauri/src-tauri/Cargo.toml --test '*' \
            -- --test-threads=1 2>&1 || true

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 4: Platform Build Matrix — parallel native builds.
  # ═══════════════════════════════════════════════════════════════════════════

  build:
    name: Build / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [integration-tests]
    if: ${{ !cancelled() && needs.integration-tests.result == 'success' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            bundles: deb
            artifact-name: tauri-linux-x86_64
          - platform: windows
            os: windows-latest
            bundles: nsis
            artifact-name: tauri-windows-x86_64
          - platform: macos
            os: macos-latest
            bundles: dmg
            artifact-name: tauri-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt package archives (Tauri system dependencies)
        if: matrix.platform == 'linux'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-tauri-deps-v1

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libwebkit2gtk-4.0-dev \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: |
            crates/pykaraoke-engine
            src/runtimes/tauri/src-tauri

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Tauri CLI
        run: npm install -g --ignore-scripts @tauri-apps/cli@1.6.3

      - name: Build Rust engine (workspace)
        run: cargo build --release --workspace --bin pykaraoke-engine-cli

      - name: Build Tauri application
        working-directory: src/runtimes/tauri
        run: tauri build --bundles ${{ matrix.bundles }}

      - name: Validate Rust backend binary artifact (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          BINARY="src/runtimes/tauri/src-tauri/target/release/pykaraoke-engine-cli.exe"
          if [ -f "$BINARY" ]; then
            SIZE=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY" 2>/dev/null)
            echo "Rust backend binary: $BINARY ($SIZE bytes)"
            test "$SIZE" -gt 100000 || { echo "ERROR: Binary too small"; exit 1; }
          else
            # Fall back to the staged resource
            BINARY="src/runtimes/tauri/src-tauri/resources/pykaraoke-engine-cli.exe"
            if [ -f "$BINARY" ]; then
              SIZE=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY" 2>/dev/null)
              echo "Rust backend binary (staged): $BINARY ($SIZE bytes)"
              test "$SIZE" -gt 100000 || { echo "ERROR: Binary too small"; exit 1; }
            else
              echo "ERROR: Rust backend binary not found"
              exit 1
            fi
          fi

      - name: Upload platform build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: src/runtimes/tauri/src-tauri/target/release/bundle/
          retention-days: 14
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 5: End-to-End Tests — validate each platform's artifact.
  # ═══════════════════════════════════════════════════════════════════════════

  e2e-tests:
    name: E2E Tests / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            artifact-name: tauri-linux-x86_64
          - platform: windows
            os: windows-latest
            artifact-name: tauri-windows-x86_64
          - platform: macos
            os: macos-latest
            artifact-name: tauri-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download platform build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/

      - name: Verify artifact exists
        shell: bash
        run: |
          echo "=== Platform build artifacts ==="
          find dist/ -type f | sort
          file_count=$(find dist/ -type f | wc -l)
          echo "Total files: $file_count"
          test "$file_count" -gt 0 || { echo "ERROR: No artifacts found"; exit 1; }

      - name: Install Linux display and Chromium (for headless E2E)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q xvfb chromium-browser chromium-chromedriver

      - name: Run E2E tests (Linux — headless via Xvfb)
        if: matrix.platform == 'linux'
        run: |
          xvfb-run -a cargo test --manifest-path src/runtimes/tauri/src-tauri/Cargo.toml \
            -v -- --test-threads=1 --show-output

      - name: Run artifact validation (Windows / macOS)
        if: matrix.platform != 'linux'
        shell: bash
        run: |
          cargo test --manifest-path src/runtimes/tauri/src-tauri/Cargo.toml \
            -v -- --test-threads=1 --show-output

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.platform }}
          path: dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 6: Release — semver tag + GitHub Release with all platform artifacts.
  # ═══════════════════════════════════════════════════════════════════════════

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: ${{ !cancelled() && needs.e2e-tests.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main,master
          tag_prefix: v
          dry_run: true

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-*
          path: release-artifacts/
          merge-multiple: false

      - name: Collect distributable files
        run: |
          mkdir -p release-files/
          find release-artifacts/ -type f \( \
            -name "*.deb" -o \
            -name "*.exe" -o \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*.AppImage" \
          \) -exec cp {} release-files/ \;
          echo "=== Files to release ==="
          ls -lh release-files/
          file_count=$(find release-files/ -type f | wc -l)
          echo "Total: $file_count file(s)"
          test "$file_count" -gt 0 || { echo "ERROR: No distributable files found"; exit 1; }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: PyKaraoke NG ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          draft: false
          prerelease: false
          make_latest: true
          files: release-files/*
